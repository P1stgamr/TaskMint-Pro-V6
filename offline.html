<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline — TaskMint Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a1a;color:white;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.wrap{max-width:320px}
.icon{font-size:4rem;margin-bottom:20px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
h1{font-size:1.4rem;margin-bottom:10px;background:linear-gradient(90deg,#00e5ff,#b026ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#888;font-size:0.9rem;line-height:1.6;margin-bottom:24px}
button{background:linear-gradient(135deg,#00e5ff,#b026ff);border:none;color:white;padding:14px 30px;border-radius:25px;font-size:1rem;font-weight:700;cursor:pointer;width:100%}
.tip{color:#555;font-size:0.78rem;margin-top:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">📡</div>
  <h1>No Internet!</h1>
  <p>You are currently offline. Please check your internet connection and try again.<br><br>TaskMint Pro is cached and will work automatically when your connection is restored.</p>
  <button onclick="location.reload()">🔄 Try Again</button>
  <p class="tip">💡 Enable WiFi or mobile data</p>
</div>
</body>
</html>
